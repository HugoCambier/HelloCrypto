name: Cron Tick (manual only)

# Note: scheduled execution is handled by cron-job.org which pings
# /api/cron/tick directly on Vercel. GitHub Actions schedules proved
# unreliable on this account (frequent skips). This workflow is kept
# only for manual triggers via `gh workflow run runner.yml` or the
# Actions UI's "Run workflow" button.
on:
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Vercel cron tick
        env:
          VERCEL_URL:   ${{ secrets.VERCEL_URL }}
          CRON_SECRET:  ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 90 \
            "$VERCEL_URL/api/cron/tick")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" != "200" ]; then
            exit 1
          fi

name: Cron Tick

on:
  schedule:
    # Toutes les 5 minutes — déclenche /api/cron/tick sur Vercel,
    # qui fait le vrai travail (Binance OK depuis cdg1, contrairement
    # aux runners GH Actions qui sont sur des IPs US bloquées).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Vercel cron tick
        env:
          VERCEL_URL:   ${{ secrets.VERCEL_URL }}
          CRON_SECRET:  ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 90 \
            "$VERCEL_URL/api/cron/tick")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" != "200" ]; then
            exit 1
          fi
